name: Update Wordle Answers

on:
  schedule:
    # Run daily at 5:30 AM UTC (30 min after Wordle rollover)
    - cron: '30 5 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  update-answers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Fetch latest answers from NYT
        run: npm run fetch:answers

      - name: Regenerate wordlists
        run: npm run sync:wordlists

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet && echo "No changes" && exit 0
          git add src/data/ src/lib/wordlists.ts src/lib/wordle/answersByDate.ts
          git commit -m "chore: update Wordle answers $(date -u +%Y-%m-%d)"
          git push
