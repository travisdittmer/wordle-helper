name: Update Allowed Words

on:
  schedule:
    # Run every two weeks on Monday at 6:00 AM UTC
    - cron: '0 6 1,15 * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  update-allowed-words:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Back up current allowed_words.txt
        run: cp src/data/allowed_words.txt src/data/allowed_words.txt.bak

      - name: Fetch allowed words from NYT bundle
        id: fetch
        run: npm run fetch:allowed
        continue-on-error: true

      - name: Rollback on failure
        if: steps.fetch.outcome == 'failure'
        run: |
          echo "::error::fetch:allowed failed — rolling back to previous word list"
          mv src/data/allowed_words.txt.bak src/data/allowed_words.txt
          exit 1

      - name: Regenerate wordlists
        run: |
          rm -f src/data/allowed_words.txt.bak
          npm run sync:wordlists

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet && echo "No changes" && exit 0
          git add src/data/allowed_words.txt src/lib/wordlists.ts
          git commit -m "chore: update allowed words from NYT bundle $(date -u +%Y-%m-%d)"
          git push
